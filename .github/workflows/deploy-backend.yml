# SSH: repository secret SSH_PRIVATE_KEY (рекомендуется) **или** SSH_PASSWORD (логин по паролю).
# Для пароля на VPS в sshd должно быть PasswordAuthentication yes (перезапуск sshd после правки).
# На VPS в /opt/learningplatform/backend/.env задайте POSTGRES_CONNECTION_STRING=Host=...;... (см. docker-compose.yml).
name: Deploy backend (manual)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: img
        run: echo "IMAGE=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.IMAGE }}:latest
            ${{ steps.img.outputs.IMAGE }}:${{ github.sha }}

      - name: Ensure deploy directory on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: mkdir -p /opt/learningplatform/backend

      - name: Upload docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: docker-compose.yml
          target: /opt/learningplatform/backend/

      - name: Compose pull and up on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ steps.img.outputs.IMAGE }}:latest
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GITHUB_ACTOR_REF: ${{ github.actor }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: BACKEND_IMAGE,GHCR_PULL_TOKEN,GITHUB_ACTOR_REF
          script: |
            set -eu
            cd /opt/learningplatform/backend
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR_REF" --password-stdin
            fi
            export BACKEND_IMAGE
            docker compose pull
            docker compose up -d
            sleep 15
            ok=0
            for i in 1 2 3 4 5 6; do
              if curl -fsS http://127.0.0.1:8080/health/live >/dev/null 2>&1; then
                echo "Health check OK (/health/live)"
                ok=1
                break
              fi
              if curl -fsS http://127.0.0.1:8080/swagger/v1/swagger.json >/dev/null 2>&1; then
                echo "Health check OK (/swagger — образ без /health/live, после мержа Program.cs останется только live)"
                ok=1
                break
              fi
              sleep 5
            done
            if [ "$ok" != 1 ]; then
              echo "--- HTTP status (диагностика) ---"
              curl -sS -o /dev/null -w "health/live: %{http_code}\n" http://127.0.0.1:8080/health/live || echo "health/live: curl_error"
              curl -sS -o /dev/null -w "swagger.json: %{http_code}\n" http://127.0.0.1:8080/swagger/v1/swagger.json || echo "swagger: curl_error"
              echo "--- docker logs learningplatform-api (last 120 lines) ---"
              docker logs learningplatform-api --tail 120 2>&1 || true
              exit 1
            fi
